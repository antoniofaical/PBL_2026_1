name: kinexa_app
description: Kinexa — coleta biomecânica ESP32 + MPU6050
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.12.1

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  go_router: ^16.0.0
  flutter_riverpod: ^2.6.1
  dio: ^5.9.0
  shared_preferences: ^2.5.3
  sqflite: ^2.4.2
  path_provider: ^2.1.5
  path: ^1.9.1
  uuid: ^4.5.1
  intl: ^0.20.2
  flutter_svg: ^2.0.0
  material_symbols_icons: ^4.2808.0
  flutter_reactive_ble: ^5.4.0
  permission_handler: ^11.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: true
  ios: false
  image_path: assets/icons/kinexa_launcher.png
  adaptive_icon_background: "#000000"
  adaptive_icon_foreground: assets/icons/kinexa_adaptive_foreground.png
  adaptive_icon_foreground_inset: 0
  min_sdk_android: 21
  remove_alpha_ios: true

flutter:
  uses-material-design: true

  assets:
    - assets/logos/
    - assets/icons/
    - assets/effects/
    - assets/diagrams/

  fonts:
    - family: JetBrainsMono
      fonts:
        - asset: assets/fonts/JetBrainsMono-Regular.ttf
          weight: 400
        - asset: assets/fonts/JetBrainsMono-Medium.ttf
          weight: 500
        - asset: assets/fonts/JetBrainsMono-Bold.ttf
          weight: 700

    - family: Digital7
      fonts:
        - asset: assets/fonts/Digital7-Regular.ttf
          weight: 400

    - family: Digital7Mono
      fonts:
        - asset: assets/fonts/Digital7-Mono.ttf
          weight: 400
